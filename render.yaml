# Render blueprint. Deploy: push this repo, then in Render "New +" -> "Blueprint"
# and point at it. Render injects PORT and RENDER_EXTERNAL_URL automatically, so
# the lobby QR code resolves to the public https URL (no LAN IP needed).
services:
  - type: web
    name: board-game-engine
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w client
    startCommand: npm run dev -w server
    envVars:
      - key: NODE_VERSION
        value: "20"
      # The custom domain the lobby QR code should point at. Takes priority over
      # Render's own RENDER_EXTERNAL_URL (the .onrender.com host). Update this if
      # the domain changes.
      - key: PUBLIC_URL
        value: https://boardgamesengine.com
