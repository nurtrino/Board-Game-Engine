# Render blueprint. Deploy: push this repo, then in Render "New +" -> "Blueprint"
# and point at it. Render injects PORT and RENDER_EXTERNAL_URL automatically, so
# the lobby QR code resolves to the public https URL (no LAN IP needed).
#
# The database keeps saved games across deploys and restarts (Render's service
# filesystem is wiped on every deploy, so file saves alone wouldn't survive a
# push). NOTE: Render's free Postgres tier expires after 30 days — upgrade it,
# or point DATABASE_URL at any free hosted Postgres (Neon, Supabase) instead.
services:
  - type: web
    name: board-game-engine
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w client
    startCommand: npm run dev -w server
    envVars:
      - key: NODE_VERSION
        value: "20"
      # The custom domain the lobby QR code should point at. Takes priority over
      # Render's own RENDER_EXTERNAL_URL (the .onrender.com host). Update this if
      # the domain changes.
      - key: PUBLIC_URL
        value: https://boardgamesengine.com
      - key: DATABASE_URL
        fromDatabase:
          name: bge-saves
          property: connectionString

databases:
  - name: bge-saves
    plan: free
